<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; letter-spacing: -0.01em; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 h-screen flex flex-col">
    
    <!-- Navigation Bar -->
    <nav class="p-6 w-full flex justify-between items-center shrink-0 border-b border-slate-200">
        <div class="max-w-7xl mx-auto w-full flex justify-between items-center">
            <h1 class="text-lg font-light tracking-widest uppercase text-slate-800">Auto-Dashboard</h1>
            
            <div class="flex items-center gap-6">
                <!-- Solid Professional Button -->
                <a href="/" class="text-xs font-bold tracking-widest uppercase bg-slate-800 text-white px-6 py-3 hover:bg-slate-700 transition-colors">
                    New Analysis
                </a>
            </div>
        </div>
    </nav>

    <!-- Content Grid -->
    <main class="flex-grow overflow-y-auto max-w-7xl mx-auto w-full p-6 grid grid-cols-1 md:grid-cols-2 gap-8">
        {% for chart in dashboard_data %}
        <div class="flex flex-col p-6 bg-white border border-slate-200 shadow-sm">
            <div class="mb-4">
                <span class="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-800">Analysis {{ loop.index }}</span>
                <p class="text-sm mt-2 text-slate-600 font-light leading-relaxed">"{{ chart.rationale }}"</p>
            </div>
            <div id="{{ chart.id }}" class="w-full h-[320px]"></div>
        </div>
        {% endfor %}
    </main>

    <!-- The Minimalist Footer -->
    <footer class="py-6 text-center shrink-0">
        <p class="text-xs tracking-widest text-slate-400 uppercase">
            Developed by <a href="https://www.linkedin.com/in/pranav-joshi-268595251/" target="_blank" class="text-slate-800 font-bold hover:underline">Pranav Joshi</a>
        </p>
    </footer>

    <script>
        const allCharts = {{ dashboard_data | tojson }};
        
        // Locked to the professional Slate 800 theme
        const theme = { accent: '#1e293b', text: '#475569', grid: '#e2e8f0' };

        function draw() {
            allCharts.forEach(chart => {
                const trace = { 
                    x: chart.x, y: chart.y, type: chart.type, 
                    marker: { color: theme.accent }, 
                    line: { color: theme.accent, width: 2 } 
                };
                const layout = {
                    title: { text: chart.title, font: { size: 13, color: theme.text, family: 'Inter' }, x: 0 },
                    paper_bgcolor: 'rgba(0,0,0,0)',
                    plot_bgcolor: 'rgba(0,0,0,0)',
                    xaxis: { showgrid: false, tickfont: { size: 11, color: theme.text } },
                    yaxis: { gridcolor: theme.grid, tickfont: { size: 11, color: theme.text } },
                    margin: { t: 40, b: 40, l: 40, r: 20 },
                    autosize: true
                };
                Plotly.newPlot(chart.id, [trace], layout, {responsive: true, displayModeBar: false});
            });
        }

        draw();
        
        // Handle normal window resizing smoothly
        window.addEventListener('resize', () => {
            allCharts.forEach(chart => {
                Plotly.Plots.resize(chart.id);
            });
        });
    </script>
</body>
</html>
