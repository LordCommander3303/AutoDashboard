<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoDashboard | Configure</title>
    <!-- This script is the magic that makes it look like a SaaS app -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans h-screen flex items-center justify-center">

    <!-- The White Card Wrapper -->
    <div class="bg-white p-8 rounded-xl shadow-lg border border-slate-200 max-w-md w-full">
        <h1 class="text-2xl font-bold text-slate-900 mb-2">Configure Dashboard</h1>
        <p class="text-sm text-slate-500 mb-6">Upload your data and define your analytical strategy.</p>

        <!-- The Form -->
        <form action="/upload" method="POST" enctype="multipart/form-data" class="space-y-5">
            
            <!-- 1. The Data -->
            <div>
                <label class="block text-sm font-semibold mb-1">1. Upload CSV Data</label>
                <input type="file" name="data_file" accept=".csv" required 
                       class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
            </div>

            <!-- 2. The Universal Prompt -->
            <div>
                <label class="block text-sm font-semibold mb-1">2. What do you want to know? (Optional)</label>
                <textarea name="user_prompt" rows="3" placeholder="e.g., 'Compare average salaries across departments', 'Find the region with the most delivery delays', or leave blank for a general overview." 
                          class="w-full p-2 border border-slate-300 rounded text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none"></textarea>
            </div>

            <!-- Submit -->
            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded hover:bg-blue-700 transition duration-200 mt-4">
                Generate AI Dashboard
            </button>
            
        </form>
    </div>

</body>
</html>
